paths:
  uploads: public/uploads
  static: public
  dam_uploads: '{collection}'
  dam_uploads_filename: '[asset_filename]'
collections_config:
  en_products:
    path: src/content/en/products
    icon: nest_protect
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
collection_groups:
  - heading: Content (English — source of truth)
    collections:
      - pages-en
      - blog-en
      - services-en
      - faq-en
      - settings-en
  - heading: Content (Español — auto-translated, override per-string)
    collections:
      - pages-es
      - blog-es
      - services-es
      - faq-es
      - settings-es
  - heading: Content (English-CA — auto-localized)
    collections:
      - pages-en-ca
      - blog-en-ca
      - services-en-ca
      - faq-en-ca
      - settings-en-ca
  - heading: Content (Français-CA — Quebec auto-translated)
    collections:
      - pages-fr-ca
      - blog-fr-ca
      - services-fr-ca
      - faq-fr-ca
      - settings-fr-ca
  - heading: Site data
    collections:
      - data
  - heading: New Collections
    collections:
      - en_products
_editables:
  content:
    allow_custom_markup: false
    remove_custom_markup: false
    image_size_attributes: true
    styles:
      - class: btn btn--orange
        label: Button — Primary (orange)
        type: link
      - class: btn btn--orange-outline
        label: Button — Outline
        type: link
      - class: btn btn--ink
        label: Button — Dark
        type: link
      - class: btn btn--ghost
        label: Button — Ghost (outline)
        type: link
      - class: link--underline
        label: Underlined link
        type: link
  block:
    allow_custom_markup: false
    remove_custom_markup: false
    image_size_attributes: true
    styles:
      - class: btn btn--orange
        label: Button — Primary (orange)
        type: link
      - class: btn btn--orange-outline
        label: Button — Outline
        type: link
      - class: btn btn--ink
        label: Button — Dark
        type: link
      - class: btn btn--ghost
        label: Button — Ghost
        type: link
commit_templates:
  - template_path: .cloudcannon/commit-templates/standard.md
    extra_data:
      author_name: '[author]'
      changed_files: '[changes]'
timezone: America/Chicago
collections_config_from_glob:
  - /.cloudcannon/collections/*.cloudcannon.collections.yml
_structures_from_glob:
  - /.cloudcannon/structures/*.cloudcannon.structures.yml
_inputs_from_glob:
  - /.cloudcannon/inputs/*.cloudcannon.inputs.yml
pull_request_templates:
  - label: Standard Publish
    title: Content update — {{date}}
    template_path: .cloudcannon/pr-templates/standard.md
    _inputs:
      summary:
        type: textarea
        comment: What changed and why? Editors / reviewers will read this on the PR.
        cascade: true
      reviewer:
        type: select
        options:
          allow_empty: true
          values:
            - value: cash
              label: Cash (TVOC)
            - value: david
              label: David Jones (TVOC)
            - value: heatnglo
              label: Heat & Glo team
        cascade: true
