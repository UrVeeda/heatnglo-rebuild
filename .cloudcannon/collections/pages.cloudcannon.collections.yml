pages-en:
  path: src/content/en/pages
  glob:
    - '**/*.json'
  name: Pages (English)
  icon: description
  url: /[slug]/
  disable_url: false
  preview:
    text:
      - key: title
    subtext:
      - key: description
    icon: description
  _enabled_editors:
    - visual
    - data
  create:
    path: '[relative_base_path]/{title|slugify}.json'
  disable_add: false
  disable_add_folder: false
  disable_file_actions: false
  schemas:
    default:
      path: .cloudcannon/schemas/page.json
      reorder_inputs: true
      hide_extra_inputs: false
      remove_empty_inputs: false
      remove_extra_inputs: true
      name: New English Page
