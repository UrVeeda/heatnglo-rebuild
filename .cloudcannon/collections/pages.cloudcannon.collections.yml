# Pages collections — one per locale (Phase 1 locale_routed lock).
# pages-en is editor-facing; other locales are translate-loader output.

pages-en:
  path: src/content/en/pages
  glob: ['**/*.json']
  name: Pages (English)
  icon: description
  output: true
  url: '/[slug]/'
  _enabled_editors: [visual, data]
  schemas:
    default:
      path: .cloudcannon/schemas/page.json
      name: 'New English Page'
  create:
    path: '[relative_base_path]/{title|slugify}.json'
  preview:
    text:
      - key: title
    subtext:
      - key: description
    icon: description
  picker_preview:
    text:
      - key: title
    icon: description

pages-es:
  path: src/content/es/pages
  glob: ['**/*.json']
  name: Pages (Español — auto)
  icon: language
  output: true
  url: '/es/[slug]/'
  _enabled_editors: [data]    # Read-only structurally — translate-loader regenerates
  disable_add: true            # Editors cannot add ES pages directly; they add EN, translate-loader fans out
  preview:
    text:
      - key: title
    subtext:
      - key: description
    icon: language

pages-en-ca:
  path: src/content/en-ca/pages
  glob: ['**/*.json']
  name: Pages (English-CA — auto)
  icon: language
  output: true
  url: '/en-ca/[slug]/'
  _enabled_editors: [data]
  disable_add: true
  preview:
    text:
      - key: title
    subtext:
      - key: description
    icon: language

pages-fr-ca:
  path: src/content/fr-ca/pages
  glob: ['**/*.json']
  name: Pages (Français-CA — auto)
  icon: language
  output: true
  url: '/fr-ca/[slug]/'
  _enabled_editors: [data]
  disable_add: true
  preview:
    text:
      - key: title
    subtext:
      - key: description
    icon: language
