# Products collections — one per locale, mirrors the pages-* pattern.
# products-en is editor-facing; other locales are translate-loader output.

products-en:
  path: src/content/en/products
  glob: ['**/*.json']
  name: Products (English)
  icon: fireplace
  output: true
  url: '/fireplaces/[slug]/'
  _enabled_editors: [visual, data]
  schemas:
    default:
      path: .cloudcannon/schemas/product.json
      name: 'New English Product'
  create:
    path: '[relative_base_path]/{family|slugify}.json'
  preview:
    text:
      - key: title
    subtext:
      - key: description
    icon: fireplace

products-es:
  path: src/content/es/products
  glob: ['**/*.json']
  name: Products (Español — auto)
  icon: language
  output: true
  url: '/es/fireplaces/[slug]/'
  _enabled_editors: [data]
  disable_add: true
  preview:
    text:
      - key: title
    subtext:
      - key: description
    icon: language

